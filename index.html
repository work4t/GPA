<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root {

--primary: #235fa7;
--accent: #3182dc;
--bg-color: #f8f9fa;
--text-color: #333;
--danger: #e74c3c;
}
body {
font-family: 'Cairo', Tahoma, sans-serif;
background-color: var(--bg-color);
padding: 15px;
display: flex;
justify-content: center;
color: var(--text-color);
}
.container {
background: white;
padding: 25px;
border-radius: 16px;
box-shadow: 0 12px 30px rgba(0,0,0,0.06);
max-width: 850px;
width: 100%;
box-sizing: border-box;
}
h2 {
text-align: center;
color: #000;
border-bottom: 3px solid var(--accent);
padding-bottom: 12px;
font-weight: 800;
margin-top: 0;
font-size: 22px;
}
.selector-group {
display: flex;
flex-direction: column;
gap: 20px;
margin-bottom: 25px;
}
.selector-field {
display: flex;
flex-direction: column;
gap: 8px;
}
label {
font-weight: 700;
color: #000;
font-size: 15px;
}
select {
padding: 12px 15px;
border-radius: 10px;
border: 2px solid #e0e0e0;
font-size: 15px;
font-family: inherit;
font-weight: 600;
outline: none;
background-color: #fafafa;
color: #444;
cursor: pointer;
transition: all 0.3s ease;
appearance: none;
background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23235fa7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
background-repeat: no-repeat;
background-position: left 15px center;
background-size: 18px;
}
select:focus {
border-color: var(--accent);
background-color: #fff;
box-shadow: 0 0 0 4px rgba(49, 130, 220, 0.15);
}
.radio-group {
display: flex;
gap: 10px;
flex-wrap: wrap;
margin-top: 5px;
}
.radio-card {
flex: 1;
min-width: 130px;
position: relative;
}
.radio-card input[type="radio"] {
position: absolute;
opacity: 0;
width: 0;
height: 0;
}
.radio-label {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
padding: 12px;
background: #f8f9fa;
border: 2px solid #e0e0e0;
border-radius: 10px;
cursor: pointer;
font-weight: 700;
font-size: 14px;
transition: all 0.25s ease;
text-align: center;
color: #000;
}
.radio-label::before {
content: "";
width: 12px;
height: 12px;
border: 2px solid #b0b0b0;
border-radius: 50%;
display: inline-block;
transition: all 0.2s ease;
flex-shrink: 0;
}
.radio-card input[type="radio"]:checked + .radio-label {
background-color: #e8f4fd;
border-color: var(--accent);
color: #000;
}
.radio-card input[type="radio"]:checked + .radio-label::before {
border-color: var(--accent);
background-color: var(--accent);
box-shadow: inset 0 0 0 2px #fff;
}
.hidden { display: none !important; }
.table-container {
width: 100%;
overflow-x: auto;
margin-top: 20px;
border-radius: 8px;
border: 1px solid #eee;
-webkit-overflow-scrolling: touch;
}
table {
width: 100%;
border-collapse: collapse;
min-width: 500px;
table-layout: fixed;
}
table col.col-select { width: 9%; }
table col.col-name { width: 29%; }
table col.col-hours { width: 16%; }
table col.col-score { width: 23%; }
table col.col-gpa { width: 23%; }
th, td {
padding: 12px 10px;
text-align: right;
border-bottom: 1px solid #eee;
font-size: 14px;
font-weight: 600;
overflow-wrap: break-word;
word-break: break-word;
}
th {
background-color: var(--primary);
color: white;
font-weight: 700;
vertical-align: middle;
font-size: 14px;
padding: 10px 4px;
white-space: nowrap;
}
tr:last-child td { border-bottom: none; }
tr:hover { background-color: #fcfdfe; }
.course-row {
transition: all 0.3s ease;
}
.course-row.disabled-course {
opacity: 0.4;
}
.course-row.disabled-course input[type="number"] {
background-color: #e0e0e0;
pointer-events: none;
}
input[type="number"] {
width: 75px;
padding: 8px;
border: 2px solid #e0e0e0;
border-radius: 6px;
text-align: center;
font-family: inherit;
font-weight: 700;
font-size: 14px;
outline: none;
transition: border-color 0.2s;
box-sizing: border-box;
}
input[type="number"]:focus { border-color: var(--accent); }

.elective-radio {
display: none;
}
.elective-check-label {
display: inline-flex;
align-items: center;
justify-content: center;
width: 19px;
height: 19px;
border-radius: 50%;
border: 2px solid #ccc;
background: #f5f5f5;
cursor: pointer;
transition: all 0.2s ease;
user-select: none;
}

.elective-radio:checked + .elective-check-label {
background-color: var(--accent);
border-color: var(--accent);
}
.elective-radio:checked + .elective-check-label svg {
stroke: #fff !important;
}
.elective-check-label svg {
width: 11px;
height: 11px;
stroke: transparent;
stroke-width: 3;
fill: none;
stroke-linecap: round;
stroke-linejoin: round;
transition: stroke 0.2s ease;
}

.required-check {
display: inline-flex;
align-items: center;
justify-content: center;
width: 22px;
height: 22px;
border-radius: 50%;
background-color: var(--accent);
color: #fff;
}
.required-check svg {
width: 14px;
height: 14px;
stroke: #fff;
stroke-width: 3;
fill: none;
stroke-linecap: round;
stroke-linejoin: round;
}
.btn-calc {
display: block;
width: 100%;
padding: 15px;
margin-top: 25px;
background-color: var(--primary);
color: white;
border: none;
border-radius: 12px;
font-size: 18px;
font-weight: 700;
font-family: inherit;
cursor: pointer;
transition: background-color 0.2s, transform 0.1s;
}
.btn-calc:hover { background-color: #1b4d8a; }
.btn-calc:active { transform: scale(0.99); }

#result-box {
margin-top: 25px;
padding: 30px 20px;
border-radius: 16px;
text-align: center;
display: none;
background-color: #eef7fc;
border: 1px solid #d4ebfc;
}
#result-box h3 {
border: none;
padding: 0;
margin: 0 0 15px 0;
justify-content: center;
display: flex;
font-size: 20px;
color: #333;
font-weight: 700;
}
.gpa-value {
font-size: 48px;
font-weight: 800;
color: #2ecc71;
margin-bottom: 15px;
line-height: 1;
}
.grade-label-wrapper {
font-size: 22px;
font-weight: 700;
color: #2c3e50;
display: inline-flex;
align-items: center;
gap: 12px;
justify-content: center;
}
.grade-separator {
color: #ccc;
font-weight: 400;
}

.gpa-cell-content {
display: flex;
width: 100%;
max-width: 110px;
}
.row-points {
width: 55%;
color: var(--accent);
font-weight: 800;
text-align: right;
}
.row-sep {
width: 10%;
color: #ccc;
font-weight: 400;
text-align: center;
}
.row-code {
width: 35%;
font-weight: 700;
color: #000;
text-align: left;
}

.placeholder-msg {
text-align: center;
color: #e67e22;
font-weight: 700;
margin-top: 25px;
padding: 15px;
background: #fdf5e6;
border-radius: 10px;
border: 1px dashed #f39c12;
font-size: 14px;
}

#error-box {
margin-top: 15px;
padding: 12px;
background-color: #fde8e8;
border: 1px solid #f7b7b7;
color: var(--danger);
border-radius: 8px;
font-weight: 700;
font-size: 14px;
text-align: center;
display: none;
}
.accordion-wrapper { margin-top: 20px; display: flex; flex-direction: column; gap: 6px; }
.accordion-panel { overflow: hidden; }
.accordion-header {
background: white;
padding: 10px 4px;
cursor: pointer;
user-select: none;
}
.accordion-header-title {
display: inline-flex;
align-items: center;
gap: 7px;
border-bottom: 2px solid var(--accent);
padding-bottom: 3px;
width: fit-content;
max-width: 100%;
}
.accordion-bullet {
width: 10px; height: 10px;
border-radius: 50%;
background: var(--accent);
flex-shrink: 0;
display: inline-block;
}
.accordion-term-text {
font-weight: 800;
font-size: 15px;
color: var(--accent);
}
.accordion-chevron {
display: inline-flex;
align-items: center;
color: var(--accent);
transition: transform 0.3s ease;
}
.accordion-chevron svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.accordion-header.open .accordion-chevron { transform: rotate(180deg); }
.accordion-body { display: none; }
.accordion-body.open { display: block; }
#content-footer { margin-top: 5px; }

.pdf-section { margin-top: 20px; }
.pdf-combined {
display: flex;
flex-direction: row;
align-items: center;
border: 2px solid #e0e0e0;
border-radius: 12px;
overflow: hidden;
background: white;
transition: border-color 0.2s;
}
.pdf-combined:focus-within { border-color: #27ae60; }
.pdf-name-input {

padding: 14px 15px;
border: none;
font-family: inherit;
font-size: 15px;
font-weight: 600;
outline: none;
background: white;
text-align: right;
}
.btn-pdf {
padding: 14px 24px;
background: #27ae60;
color: white;
border: none;
font-size: 16px;
font-weight: 700;
font-family: inherit;
cursor: pointer;
transition: background 0.2s;
white-space: nowrap;
flex-shrink: 0;
}
.btn-pdf:hover { background: #219150; }
</style>
</head>

</div>
</div>
</div>

<div id="dynamic-table-wrapper" class="hidden">

<table>
<colgroup>
<col class="col-select"><col class="col-name"><col class="col-hours"><col class="col-score"><col class="col-gpa">
</colgroup>
<thead>
<tr>

</tr>
</thead>
<tbody id="subjects-body">
</tbody>
</table>
</div>
</div>
<div id="accordion-wrapper" class="accordion-wrapper hidden"></div>
<div id="content-footer" class="hidden">
<div id="error-box"></div>
<button class="btn-calc" onclick="calculateGPA()">احسب الـ GPA</button>
<div id="result-box">

<div class="pdf-section hidden" id="pdf-section">

<button class="btn-pdf" onclick="exportPDF()">PDF</button>
</div>
</div>
</div>
</div>

const REQUIRED_CHECK_HTML = `<span class="required-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></span>`;
function getStorageKey(dept, year, term) {
return `gpa_grades_${dept}_y${year}_${term}`;
}
function saveGrades(dept, year, term, tbody) {
const data = {};
tbody.querySelectorAll('.course-row').forEach(row => {
const nameCell = row.querySelector('td:nth-child(2)');
const scoreInput = row.querySelector('.score');
const radio = row.querySelector('.elective-radio');
if (nameCell && scoreInput) {
data[nameCell.innerText] = {
score: scoreInput.value,
disabled: row.classList.contains('disabled-course'),
radioChecked: radio ? radio.checked : null
};
}
});
try { localStorage.setItem(getStorageKey(dept, year, term), JSON.stringify(data)); } catch(e) {}
}
function restoreGrades(dept, year, term, tbody) {
let saved;
try { saved = JSON.parse(localStorage.getItem(getStorageKey(dept, year, term))); } catch(e) {}
if (!saved) return;
const rows = tbody.querySelectorAll('.course-row');
rows.forEach(row => {
const nameCell = row.querySelector('td:nth-child(2)');
if (!nameCell) return;
const entry = saved[nameCell.innerText];
if (!entry) return;
const cb = row.querySelector('.elective-radio');
if (cb) cb.checked = !!entry.radioChecked;
});
refreshElectiveGroupStates(tbody);
rows.forEach(row => {
const nameCell = row.querySelector('td:nth-child(2)');
if (!nameCell) return;
const entry = saved[nameCell.innerText];
if (!entry) return;
if (row.classList.contains('disabled-course')) return;
const scoreInput = row.querySelector('.score');
if (scoreInput && entry.score !== '') {
scoreInput.value = entry.score;
updateRowPoints(scoreInput);
}
});
}

document.getElementById('label-t2').textContent = `الترم ${t2Num}`;

function buildRows(tbody, subjects, allSubjects) {
subjects.forEach(subject => {
const tr = document.createElement('tr');
tr.className = 'course-row';
tr.setAttribute('data-hours', subject.hours);
if (subject.isElective) {
tr.classList.add('disabled-course');
tr.id = `row-${subject.id}`;
tr.setAttribute('data-group', subject.group);
tr.setAttribute('data-pick', subject.pick || 1);
}
tr.innerHTML = `
<td>${subject.isElective
? `<input type="checkbox" id="radio-${subject.id}" class="elective-radio" onchange="toggleElectiveCheckbox(this)"><label for="radio-${subject.id}" class="elective-check-label"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></label>`
: REQUIRED_CHECK_HTML}</td>
<td>${subject.name}</td>
<td>${subject.hours}</td>
<td><input type="number" class="score" oninput="updateRowPoints(this)" min="0" max="100"${subject.isElective ? ' disabled' : ''}></td>
<td>
<div class="gpa-cell-content">
<span class="row-points">-</span>
<span class="row-sep">|</span>
<span class="row-code"></span>
</div>
</td>
`;
tbody.appendChild(tr);
});
}
function buildAccordionPanel(container, label, subjects, allSubjects, saveYear, saveTerm) {
const panel = document.createElement('div');
panel.className = 'accordion-panel';
const header = document.createElement('div');
header.className = 'accordion-header';
header.innerHTML = `<span class="accordion-header-title"><span class="accordion-bullet"></span><span class="accordion-term-text">${label}</span><span class="accordion-chevron"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg></span></span>`;
header.onclick = () => toggleAccordion(header);
const body = document.createElement('div');
body.className = 'accordion-body';
const tc = document.createElement('div');
tc.className = 'table-container';
tc.style.cssText = 'margin-top:0;border-radius:0;border:none;border-top:1px solid #eee;';
const table = document.createElement('table');
table.innerHTML = `<colgroup><col class="col-select"><col class="col-name"><col class="col-hours"><col class="col-score"><col class="col-gpa"></colgroup><thead><tr><th>اختر</th><th>المادة</th><th>الساعات</th><th>درجتك من 100</th><th>GPA المادة</th></tr></thead>`;
const tbody = document.createElement('tbody');
tbody.className = 'term-tbody';
if (saveYear !== undefined) tbody.dataset.saveYear = saveYear;
if (saveTerm !== undefined) tbody.dataset.saveTerm = saveTerm;
table.appendChild(tbody);
tc.appendChild(table);
body.appendChild(tc);
panel.appendChild(header);
panel.appendChild(body);
container.appendChild(panel);
buildRows(tbody, subjects, allSubjects);
}
function toggleAccordion(header) {
header.classList.toggle('open');
header.nextElementSibling.classList.toggle('open');
}
function showFooter() {
document.getElementById('content-footer').classList.remove('hidden');
document.getElementById('result-box').style.display = 'none';
showError('');
}
function handleTermChange() {
document.getElementById("student-name").value="";
document.getElementById("pdf-section").classList.add("hidden");
const dept = document.getElementById('department').value;
const year = parseInt(document.getElementById('year').value);
const selectedRadio = document.querySelector('input[name="term-select"]:checked');
const term = selectedRadio ? selectedRadio.value : '';
const tableWrapper = document.getElementById('dynamic-table-wrapper');
const accordionWrapper = document.getElementById('accordion-wrapper');
const placeholder = document.getElementById('placeholder-message');
const tbody = document.getElementById('subjects-body');
tbody.innerHTML = '';
accordionWrapper.innerHTML = '';
document.getElementById('result-box').style.display = 'none';
showError('');
const baseData = coursesData[dept] && coursesData[dept][year];
if (term === 'total') {
const t1 = baseData && coursesData[dept][year]['t1'];
const t2 = baseData && coursesData[dept][year]['t2'];
if (t1 && t2) {
for (let y = 1; y <= year; y++) {
const yt1 = coursesData[dept] && coursesData[dept][y] && coursesData[dept][y]['t1'];
const yt2 = coursesData[dept] && coursesData[dept][y] && coursesData[dept][y]['t2'];
if (!yt1 || !yt2) continue;
const allSubjects = [...yt1, ...yt2];
const t1Num = (y - 1) * 2 + 1;
const t2Num = (y - 1) * 2 + 2;
buildAccordionPanel(accordionWrapper, `الترم ${t1Num}`, yt1, allSubjects, y, 't1');
buildAccordionPanel(accordionWrapper, `الترم ${t2Num}`, yt2, allSubjects, y, 't2');
}
accordionWrapper.querySelectorAll('.term-tbody').forEach(tb => {
restoreGrades(dept, tb.dataset.saveYear, tb.dataset.saveTerm, tb);
});
accordionWrapper.classList.remove('hidden');
tableWrapper.classList.add('hidden');
placeholder.classList.add('hidden');
showFooter();
} else {
accordionWrapper.classList.add('hidden');
tableWrapper.classList.add('hidden');
placeholder.classList.remove('hidden');
document.getElementById('content-footer').classList.add('hidden');
}
} else if (baseData && coursesData[dept][year][term]) {
const subjects = coursesData[dept][year][term];
buildRows(tbody, subjects, subjects);
restoreGrades(dept, year, term, tbody);
tableWrapper.classList.remove('hidden');
accordionWrapper.classList.add('hidden');
placeholder.classList.add('hidden');
showFooter();
} else {
tableWrapper.classList.add('hidden');
accordionWrapper.classList.add('hidden');
placeholder.classList.remove('hidden');
document.getElementById('content-footer').classList.add('hidden');
}
}
function refreshElectiveGroupStates(scopeEl) {
const groups = new Set();
scopeEl.querySelectorAll('.course-row[data-group]').forEach(r => groups.add(r.getAttribute('data-group')));
groups.forEach(g => {
const groupRows = Array.from(scopeEl.querySelectorAll(`.course-row[data-group="${g}"]`));
const pick = parseInt(groupRows[0].getAttribute('data-pick')) || 1;
const checkedCount = groupRows.filter(r => r.querySelector('.elective-radio').checked).length;
groupRows.forEach(r => {
const cb = r.querySelector('.elective-radio');
const input = r.querySelector('.score');
if (cb.checked) {
r.classList.remove('disabled-course');
if (input) input.disabled = false;
cb.disabled = false;
} else {
r.classList.add('disabled-course');
if (input) { input.disabled = true; }
cb.disabled = checkedCount >= pick;
}
});
});
}
function toggleElectiveCheckbox(checkboxEl) {
const row = checkboxEl.closest('tr');
const tbody = checkboxEl.closest('tbody');
const group = row.getAttribute('data-group');
const pick = parseInt(row.getAttribute('data-pick')) || 1;
const groupRows = Array.from(tbody.querySelectorAll(`.course-row[data-group="${group}"]`));
const checkedCount = groupRows.filter(r => r.querySelector('.elective-radio').checked).length;
if (checkedCount > pick) {
checkboxEl.checked = false;
showError(pick === 1 ? "من فضلك اختر مادة واحدة فقط من هذه المجموعة!" : `من فضلك اختر ${pick} مواد فقط من هذه المجموعة!`);
return;
}
if (!checkboxEl.checked) {
const input = row.querySelector('.score');
if (input) input.value = '';
const pts = row.querySelector('.row-points'); if (pts) pts.innerText = '-';
const code = row.querySelector('.row-code'); if (code) code.innerText = '';
}
refreshElectiveGroupStates(tbody);
showError("");
}

document.getElementById('content-footer').classList.add('hidden');
document.getElementById('pdf-section').classList.add('hidden');
document.getElementById('placeholder-message').classList.add('hidden');
showError("");
if (stage === 'department') {
document.getElementById('year').selectedIndex = 0;
document.getElementById('term-wrapper').classList.add('hidden');
uncheckRadios();
} else if (stage === 'year') {
uncheckRadios();
}
}
function uncheckRadios() {
const radios = document.querySelectorAll('input[name="term-select"]');
radios.forEach(radio => radio.checked = false);
}
function getPrecisePoints(score) {
if (score < 60) return 0;
let points = (score - 50) / 10;
return Math.min(5.0, Math.max(0, points));
}
function getLetterGrade(score) {
if (score >= 95)  return 'A+';
if (score >= 90)  return 'A';
if (score >= 85)  return 'A-';
if (score >= 80)  return 'B+';
if (score >= 75)  return 'B';
if (score >= 70)  return 'C+';
if (score >= 65)  return 'C';
if (score >= 60)  return 'D';
return 'F';
}
function getGradeLabelText(gpa) {
if (gpa >= 4.5) return 'ممتاز';
if (gpa >= 4)   return 'ممتاز';
if (gpa >= 3.5) return 'ممتاز';
if (gpa >= 3)   return 'جيد جداً مرتفع';
if (gpa >= 2.5) return 'جيد جداً';
if (gpa >= 2)   return 'جيد مرتفع';
if (gpa >= 1.5) return 'جيد';
if (gpa >= 1)   return 'مقبول';
return 'ضعيف';
}
function getGradeCodeText(gpa) {
if (gpa >= 4.5) return '(A+)';
if (gpa >= 4)   return '(A)';
if (gpa >= 3.5) return '(A-)';
if (gpa >= 3)   return '(B+)';
if (gpa >= 2.5) return '(B)';
if (gpa >= 2)   return '(C+)';
if (gpa >= 1.5) return '(C)';
if (gpa >= 1)   return '(D)';
return '(F)';
}
function updateRowPoints(input) {
let score = parseFloat(input.value);
showError("");
if (score > 100) { input.value = 100; score = 100; }
if (score < 0) { input.value = 0; score = 0; }
let parentTd = input.parentElement.nextElementSibling;
let pointsSpan = parentTd.querySelector('.row-points');
let codeSpan = parentTd.querySelector('.row-code');
if (!isNaN(score)) {
const pts = getPrecisePoints(score);
pointsSpan.innerText = parseFloat(pts.toFixed(2));
codeSpan.innerText = getLetterGrade(score);
} else {
pointsSpan.innerText = "-";
codeSpan.innerText = "";
}
}
function showError(msg) {
const errorBox = document.getElementById('error-box');
if(msg) {
errorBox.textContent = msg;
errorBox.style.display = 'block';
} else {
errorBox.style.display = 'none';
}
}
function calculateGPA() {
const dept = document.getElementById('department').value;
const year = parseInt(document.getElementById('year').value);
const selectedRadio = document.querySelector('input[name="term-select"]:checked');
const term = selectedRadio ? selectedRadio.value : '';
if (term === 'total') {
const tbodies = document.querySelectorAll('.term-tbody');
tbodies.forEach(tb => {
if (tb.dataset.saveYear && tb.dataset.saveTerm) {
saveGrades(dept, tb.dataset.saveYear, tb.dataset.saveTerm, tb);
}
});
} else if (term) {
saveGrades(dept, year, term, document.getElementById('subjects-body'));
}
const allRows = document.querySelectorAll('#subjects-body .course-row, .term-tbody .course-row');
let totalWeight = 0;
let totalHours = 0;
let ready = true;
const electiveRows = document.querySelectorAll('#subjects-body .course-row[data-group], .term-tbody .course-row[data-group]');
if (electiveRows.length > 0) {
const groups = [...new Set(Array.from(electiveRows).map(r => r.getAttribute('data-group')))];
for (let g of groups) {
const groupRows = Array.from(electiveRows).filter(r => r.getAttribute('data-group') === g);
const pick = parseInt(groupRows[0].getAttribute('data-pick')) || 1;
const checkedCount = groupRows.filter(r => r.querySelector('.elective-radio') && r.querySelector('.elective-radio').checked).length;
if (checkedCount !== pick) {
showError(pick === 1 ? "من فضلك اختر مادة اختيارية واحدة من الجدول أولاً!" : `من فضلك اختر ${pick} مواد اختيارية من كل مجموعة أولاً!`);
return;
}
}
}
allRows.forEach(row => {
if (row.classList.contains('disabled-course')) return;
const hours = parseFloat(row.getAttribute('data-hours'));
const scoreInput = row.querySelector('.score');
if (!scoreInput || scoreInput.value === "") { ready = false; return; }
const points = getPrecisePoints(parseFloat(scoreInput.value));
totalWeight += (points * hours);
totalHours += hours;
});
if (!ready) {
showError("من فضلك أدخل كل درجات المواد المفعلة أولاً.");
return;
}
showError("");
const gpa = totalWeight / totalHours;
document.getElementById('result-box').style.display = 'block';
document.getElementById('gpa-display').innerText = gpa.toFixed(3);
document.getElementById('grade-label-text').innerText = getGradeLabelText(gpa);
document.getElementById('grade-code-text').innerText = getGradeCodeText(gpa);
document.getElementById('pdf-section').classList.remove('hidden');
}
function containsArabic(text) {
return /[\u0600-\u06FF]/.test(text || '');
}
const _lineImageCache = new Map();
let _lineImageAliasCounter = 0;
function lineToImage(text, opts = {}) {
const {
fontSize = 40,
fontWeight = 600,
color = '#2c3e50',
fontFamily = "'Cairo', Tahoma, Arial, sans-serif",
dir = 'rtl'
} = opts;
const cacheKey = `${text}|${fontSize}|${fontWeight}|${color}|${dir}`;
if (_lineImageCache.has(cacheKey)) return _lineImageCache.get(cacheKey);
// scale kept just high enough for crisp small print text; higher values
// balloon the PDF file size (each course name/line becomes an embedded image).
const scale = 1.75;
const measureCtx = document.createElement('canvas').getContext('2d');
measureCtx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
const width = Math.max(1, Math.ceil(measureCtx.measureText(text).width)) + 16;
const height = Math.ceil(fontSize * 1.5);
const canvas = document.createElement('canvas');
canvas.width = width * scale;
canvas.height = height * scale;
const ctx = canvas.getContext('2d');
ctx.scale(scale, scale);
// Transparent background so the text blends with the table's alternating
// (striped) row colors instead of showing a white box.
ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
ctx.direction = dir;
ctx.textAlign = dir === 'rtl' ? 'right' : 'left';
ctx.textBaseline = 'alphabetic';
ctx.fillStyle = color;
const anchorX = dir === 'rtl' ? width - 8 : 8;
ctx.fillText(text, anchorX, height * 0.68);
const result = {
dataUrl: canvas.toDataURL('image/png'),
width, height,
format: 'PNG',
alias: `li-${_lineImageAliasCounter++}`
};
_lineImageCache.set(cacheKey, result);
return result;
}
function drawSmartLine(doc, text, x, y, opts = {}) {
const { align = 'left', heightMM = 4.2 } = opts;
if (containsArabic(text)) {
const img = lineToImage(text, { ...opts, dir: align === 'right' ? 'rtl' : 'ltr' });
const ratio = img.width / img.height;
const wMM = heightMM * ratio;
let xPos = x;
if (align === 'right') xPos = x - wMM;
else if (align === 'center') xPos = x - wMM / 2;
const topY = y - heightMM * 0.68;
doc.addImage(img.dataUrl, img.format || 'PNG', xPos, topY, wMM, heightMM, img.alias, 'FAST');
return wMM;
} else {
doc.text(text, x, y, { align });
return doc.getTextWidth(text);
}
}
async function exportPDF() {
if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (e) {} }
const { jsPDF } = window.jspdf;
const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
const studentName = document.getElementById("student-name").value.trim() || "Student";
const deptEl = document.getElementById('department');
const yearEl = document.getElementById('year');
const yearName = yearEl.options[yearEl.selectedIndex].text;
const gpaText = document.getElementById('gpa-display').innerText;
const gradeCodeText = document.getElementById('grade-code-text').innerText;
const pageW = doc.internal.pageSize.getWidth();
doc.setFont('helvetica', 'bold');
doc.setFontSize(14);
doc.setTextColor(35, 95, 167);
doc.text('Faculty of Science - Beni Suef University', pageW / 2, 18, { align: 'center' });
doc.setFontSize(11);
doc.setTextColor(49, 130, 220);
doc.text('GPA Calculator Report', pageW / 2, 26, { align: 'center' });
doc.setDrawColor(49, 130, 220);
doc.setLineWidth(0.5);
doc.line(14, 30, pageW - 14, 30);
doc.setTextColor(44, 62, 80);
doc.setFontSize(11);
doc.setFont('helvetica', 'normal');
drawSmartLine(doc, `Student Name: ${studentName}`, 14, 38, { fontSize: 40, fontWeight: 600, color: '#2c3e50', heightMM: 4.3, align: 'left' });
const deptName = deptEl.options[deptEl.selectedIndex].text;
drawSmartLine(doc, `Department: ${deptName}   |   Academic Year: ${yearName}`, 14, 45, { fontSize: 40, fontWeight: 600, color: '#2c3e50', heightMM: 4.3, align: 'left' });
let currentY = 52;
const isTotalMode = !document.getElementById('accordion-wrapper').classList.contains('hidden');
let tbodies = [];
if (isTotalMode) {
tbodies = document.querySelectorAll('.term-tbody');
} else {
tbodies = [document.getElementById('subjects-body')];
}
tbodies.forEach((tbody, idx) => {
if (!tbody) return;
const rows = tbody.querySelectorAll('.course-row:not(.disabled-course)');
if (rows.length === 0) return;
let sectionTitle = "Semester Courses Data";
if (isTotalMode) {
const sy = parseInt(tbody.dataset.saveYear);
const st = tbody.dataset.saveTerm;
const termNum = (!isNaN(sy) && st) ? ((sy - 1) * 2 + (st === 't1' ? 1 : 2)) : (idx + 1);
sectionTitle = "Term " + termNum + " Courses";
}
doc.setFont('helvetica', 'bold');
doc.setFontSize(11);
doc.setTextColor(49, 130, 220);
doc.text(sectionTitle, 14, currentY);
currentY += 4;
const tableRows = [];
const rowNames = [];
rows.forEach((row) => {
const cells = row.querySelectorAll('td');
if (cells.length < 5) return;
const courseName = cells[1].innerText.trim();
const hours = cells[2].innerText;
const score = cells[3].querySelector('input') ? cells[3].querySelector('input').value : '-';
const ptsText = cells[4].querySelector('.row-points') ? cells[4].querySelector('.row-points').innerText : '-';
const codeText = cells[4].querySelector('.row-code') ? cells[4].querySelector('.row-code').innerText : '';
const fullGpaString = ptsText + (codeText ? ` (${codeText})` : '');
rowNames.push(courseName);
tableRows.push(['', hours, score || '-', fullGpaString]);
});
doc.autoTable({
startY: currentY,
head: [['Course Name', 'Credit Hours', 'Score / 100', 'Course GPA']],
body: tableRows,
theme: 'striped',
headStyles: { fillColor: [35, 95, 167], halign: 'center', fontSize: 10 },
bodyStyles: { halign: 'center', fontSize: 10 },
columnStyles: { 0: { cellWidth: 55 }, 1: { cellWidth: 32 }, 2: { cellWidth: 32 } },
margin: { left: 14, right: 14 },
tableLineColor: [220, 220, 220],
tableLineWidth: 0.1,
didDrawCell: function (data) {
if (data.section === 'body' && data.column.index === 0) {
const name = rowNames[data.row.index];
if (name) {
const img = lineToImage(name, { fontSize: 34, fontWeight: 600, color: '#2c3e50', dir: 'rtl' });
const ratio = img.width / img.height;
const maxW = data.cell.width - 4;
const maxH = data.cell.height - 2;
let h = maxH, w = h * ratio;
if (w > maxW) { w = maxW; h = w / ratio; }
const x = data.cell.x + (data.cell.width - w) / 2;
const y = data.cell.y + (data.cell.height - h) / 2;
doc.addImage(img.dataUrl, img.format || 'PNG', x, y, w, h, img.alias, 'FAST');
}
}
}
});
currentY = doc.lastAutoTable.finalY + 8;
});
if (gpaText && gpaText !== '0.00') {
if (currentY > 250) { doc.addPage(); currentY = 20; }
doc.setDrawColor(49, 130, 220);
doc.line(14, currentY, pageW - 14, currentY);
currentY += 8;
doc.setFont('helvetica', 'bold');
doc.setFontSize(14);
doc.setTextColor(46, 204, 113);
doc.text(`Final Cumulative GPA: ${gpaText}`, pageW / 2, currentY, { align: 'center' });
currentY += 7;
doc.setTextColor(44, 62, 80);
doc.setFontSize(11);
doc.text(`Estimation Code: ${gradeCodeText}`, pageW / 2, currentY, { align: 'center' });
}
doc.save(`GPA_${studentName.replace(/\s+/g,'_')}.pdf`);
}
